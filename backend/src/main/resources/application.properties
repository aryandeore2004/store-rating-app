server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/store_rating_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT secret (change for production) - must be 32+ chars
jwt.secret=${JWT_SECRET:ThisIsMySuperSecretKeyForJwtTokenGeneration123}
jwt.expiration=86400000

# CORS - allow React dev server locally, or your deployed frontend URL in prod
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}
